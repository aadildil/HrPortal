version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: safeway_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hrportal
      POSTGRES_USER: hruser
      POSTGRES_PASSWORD: hrpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hruser -d hrportal"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: aaadildil/safeway-vault-api:1.3
    container_name: safeway_api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hrportal
      DB_USER: hruser
      DB_PASSWORD: hrpassword
      UPLOAD_DIR: /app/uploads
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-safeway123}
      JWT_SECRET: ${JWT_SECRET:-safeway_secret}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: aaadildil/safeway-vault-frontend:1.3
    container_name: safeway_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
